<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Mobile - Deive Abraão</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            font-family: sans-serif;
        }

        canvas { display: block; }

        #ui-layer {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            z-index: 10;
        }

        #joystickBase {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            touch-action: none;
        }

        #joystick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            top: 30px;
            left: 30px;
            pointer-events: none;
        }

        #carBtn {
            position: fixed;
            bottom: 40px;
            right: 30px;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid #1565c0;
            background: #ffffffcc;
            font-weight: bold;
            color: #1565c0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            touch-action: none;
        }
    </style>
</head>

<body oncontextmenu="return false">

<div id="ui-layer">
    <div id="txtFase">Fase: 1</div>
    <div id="txtMoedas">Moedas: 0/100</div>
</div>

<canvas id="game"></canvas>

<div id="joystickBase"><div id="joystick"></div></div>
<div id="carBtn">CARRO</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* CONTROLES MULTI-TOUCH FIX */
let joy = {x:0, y:0};
let joystickTouchId = null;

const base = document.getElementById("joystickBase");
const stick = document.getElementById("joystick");

base.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystickTouchId = touch.identifier;
    updateJoystick(touch);
}, { passive: false });

window.addEventListener("touchmove", (e) => {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joystickTouchId) {
            updateJoystick(e.changedTouches[i]);
        }
    }
}, { passive: false });

window.addEventListener("touchend", (e) => {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joystickTouchId) {
            joystickTouchId = null;
            joy.x = 0; joy.y = 0;
            stick.style.left = "30px";
            stick.style.top = "30px";
        }
    }
});

function updateJoystick(touch) {
    let rect = base.getBoundingClientRect();
    let x = touch.clientX - rect.left - 60;
    let y = touch.clientY - rect.top - 60;

    let d = Math.sqrt(x*x + y*y), max = 40;
    if (d > max) { x = x/d*max; y = y/d*max; }

    joy.x = x/max;
    joy.y = y/max;

    stick.style.left = (x + 30) + "px";
    stick.style.top = (y + 30) + "px";
}

/* ESTADO DO JOGO */
let player = { x: 0, y: 0, inCar: false, angle: 0 };
let car = { x: 300, y: 300, vx: 0, vy: 0, angle: 0 };
let inHouse = true;
let door = { x: 0, y: 150 };
let fase = 1;
let score = 0;
let coins = [];

/* BOTÃO CARRO (MULTI-TOUCH) */
document.getElementById("carBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (inHouse) return;

    let dx = player.x - car.x;
    let dy = player.y - car.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (player.inCar) {
        player.inCar = false;
        player.x = car.x + 60 * Math.cos(car.angle + Math.PI/2); 
    } else if (dist < 100) {
        player.inCar = true;
    }
}, { passive: false });

function metaFase() { return fase * 100; }

function checkFase() {
    if (score >= metaFase()) {
        fase++;
        score = 0;
        alert("🔥 Fase " + fase + "!");
    }
}

function generateCoins(px, py) {
    if (coins.length < 20) {
        coins.push({
            x: px + (Math.random() - 0.5) * 1500,
            y: py + (Math.random() - 0.5) * 1500,
            collected: false
        });
    }
}

/* LÓGICA DE ATUALIZAÇÃO */
function update() {
    const playerSpeed = 4;
    const carAcc = 0.6;
    const carFriction = 0.95;
    const carMax = 10;

    if (player.inCar) {
        car.vx += joy.x * carAcc;
        car.vy += joy.y * carAcc;

        let speed = Math.sqrt(car.vx*car.vx + car.vy*car.vy);
        if (speed > carMax) {
            car.vx = (car.vx/speed) * carMax;
            car.vy = (car.vy/speed) * carMax;
        }

        // ROTAÇÃO DO CARRO: Só rotaciona se houver movimento significativo
        if (speed > 0.5) {
            car.angle = Math.atan2(car.vy, car.vx);
        }

        car.x += car.vx;
        car.y += car.vy;
        car.vx *= carFriction;
        car.vy *= carFriction;

        player.x = car.x;
        player.y = car.y;
    } else {
        if (Math.abs(joy.x) > 0.1 || Math.abs(joy.y) > 0.1) {
            player.angle = Math.atan2(joy.y, joy.x);
        }
        player.x += joy.x * playerSpeed;
        player.y += joy.y * playerSpeed;
    }

    // Colisão Porta
    let dx = player.x - door.x;
    let dy = player.y - door.y;
    if (Math.abs(dx) < 35 && Math.abs(dy) < 45) {
        inHouse = !inHouse;
        player.x = 0; 
        player.y = inHouse ? 100 : -60;
        joy.x = 0; joy.y = 0;
    }

    if (!inHouse) {
        if (Math.random() < 0.02) generateCoins(player.x, player.y);
        coins.forEach(c => {
            if (!c.collected) {
                let dxc = player.x - c.x;
                let dyc = player.y - c.y;
                if (Math.sqrt(dxc*dxc + dyc*dyc) < 35) {
                    c.collected = true;
                    score += 10;
                    checkFase();
                }
            }
        });
    }
}

/* DESENHOS */
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

    if (inHouse) {
        ctx.fillStyle = "#5d4037";
        ctx.fillRect(-300, -300, 600, 600);
        ctx.strokeStyle = "#3e2723";
        ctx.lineWidth = 20;
        ctx.strokeRect(-300, -300, 600, 600);
        ctx.fillStyle = "#222";
        ctx.fillRect(door.x - 40, door.y - 15, 80, 30);
    } else {
        // Gramado Infinito Simulado
        ctx.fillStyle = "#2e7d32";
        ctx.fillRect(player.x - canvas.width, player.y - canvas.height, canvas.width * 2, canvas.height * 2);

        coins.forEach(c => {
            if (!c.collected) {
                ctx.fillStyle = "#ffd700";
                ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, Math.PI*2); ctx.fill();
            }
        });

        // DESENHAR CARRO COM ROTAÇÃO
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        
        ctx.fillStyle = "#1565c0";
        ctx.fillRect(-45, -25, 90, 50); // Carroceria
        ctx.fillStyle = "#1e88e5";
        ctx.fillRect(-20, -20, 40, 40); // Teto
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillRect(20, -18, 5, 36);  // Parabrisa
        
        ctx.fillStyle = "#000";
        ctx.fillRect(-35, -32, 20, 10); // Rodas
        ctx.fillRect(15, -32, 20, 10);
        ctx.fillRect(-35, 22, 20, 10);
        ctx.fillRect(15, 22, 20, 10);
        ctx.restore();
    }

    // PERSONAGEM
    if (!player.inCar) {
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle + Math.PI/2);
        ctx.fillStyle = "#ffe0bd";
        ctx.beginPath(); ctx.arc(0, -15, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ff5722";
        ctx.fillRect(-12, -5, 24, 25);
        ctx.restore();
    }

    ctx.restore();
    
    document.getElementById("txtFase").innerText = "Fase: " + fase;
    document.getElementById("txtMoedas").innerText = "Moedas: " + score + "/" + metaFase();

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
