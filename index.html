<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Mobile - Deive Abraão</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            font-family: sans-serif;
        }

        canvas { display: block; }

        #ui-layer {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            z-index: 10;
        }

        #joystickBase {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            touch-action: none;
        }

        #joystick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            top: 30px;
            left: 30px;
            pointer-events: none;
        }

        .action-btn {
            position: fixed;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: rgba(255,255,255,0.3);
            color: white;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            touch-action: none;
        }

        #carBtn { bottom: 130px; right: 30px; background: rgba(21, 101, 192, 0.7); }
        #hornBtn { bottom: 40px; right: 30px; background: rgba(255, 193, 7, 0.7); }
        #lightBtn { bottom: 40px; right: 110px; background: rgba(76, 175, 80, 0.7); }
    </style>
</head>

<body oncontextmenu="return false">

<div id="ui-layer">
    <div id="txtFase">Fase: 1</div>
    <div id="txtMoedas">Moedas: 0/100</div>
</div>

<canvas id="game"></canvas>

<div id="joystickBase"><div id="joystick"></div></div>
<div id="carBtn" class="action-btn">CARRO</div>
<div id="hornBtn" class="action-btn">BUZINA</div>
<div id="lightBtn" class="action-btn">FAROL</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ÁUDIO (BUZINA) */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playHorn() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

/* CONTROLES */
let joy = {x:0, y:0};
let joystickTouchId = null;
const base = document.getElementById("joystickBase");
const stick = document.getElementById("joystick");

base.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystickTouchId = touch.identifier;
    updateJoystick(touch);
}, { passive: false });

window.addEventListener("touchmove", (e) => {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joystickTouchId) updateJoystick(e.changedTouches[i]);
    }
}, { passive: false });

window.addEventListener("touchend", (e) => {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joystickTouchId) {
            joystickTouchId = null;
            joy.x = 0; joy.y = 0;
            stick.style.left = "30px"; stick.style.top = "30px";
        }
    }
});

function updateJoystick(touch) {
    let rect = base.getBoundingClientRect();
    let x = touch.clientX - rect.left - 60;
    let y = touch.clientY - rect.top - 60;
    let d = Math.sqrt(x*x + y*y), max = 40;
    if (d > max) { x = x/d*max; y = y/d*max; }
    joy.x = x/max; joy.y = y/max;
    stick.style.left = (x + 30) + "px"; stick.style.top = (y + 30) + "px";
}

/* ESTADO DO JOGO */
let player = { x: 0, y: 100, inCar: false, angle: 0, anim: 0 };
let car = { x: 200, y: 200, vx: 0, vy: 0, angle: 0, lights: false };
let inHouse = true;
const doorPos = { x: 0, y: 300 }; // Saída da casa
let fase = 1;
let score = 0;
let coins = [];
let pedestrians = [];

/* BOTÕES DE AÇÃO */
document.getElementById("carBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (inHouse) return;
    let dist = Math.sqrt((player.x - car.x)**2 + (player.y - car.y)**2);
    if (player.inCar) {
        player.inCar = false;
        player.x = car.x + 60 * Math.cos(car.angle + Math.PI/2);
    } else if (dist < 100) {
        player.inCar = true;
    }
});

document.getElementById("hornBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    playHorn();
});

document.getElementById("lightBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    car.lights = !car.lights;
});

function update() {
    const pSpeed = 4, cAcc = 0.6, cFric = 0.95, cMax = 10;

    if (player.inCar) {
        car.vx += joy.x * cAcc; car.vy += joy.y * cAcc;
        let s = Math.sqrt(car.vx**2 + car.vy**2);
        if (s > cMax) { car.vx = (car.vx/s)*cMax; car.vy = (car.vy/s)*cMax; }
        if (s > 0.5) car.angle = Math.atan2(car.vy, car.vx);
        car.x += car.vx; car.y += car.vy;
        car.vx *= cFric; car.vy *= cFric;
        player.x = car.x; player.y = car.y;
    } else {
        if (Math.abs(joy.x) > 0.1 || Math.abs(joy.y) > 0.1) {
            player.angle = Math.atan2(joy.y, joy.x);
            player.anim += 0.2;
        }
        player.x += joy.x * pSpeed;
        player.y += joy.y * pSpeed;
    }

    // Lógica de entrar/sair da casa
    let distToDoor = Math.sqrt((player.x - doorPos.x)**2 + (player.y - doorPos.y)**2);
    if (distToDoor < 40) {
        if (inHouse) {
            inHouse = false;
            player.y = doorPos.y + 50; // cospe pra fora
        } else {
            inHouse = true;
            player.y = doorPos.y - 50; // puxa pra dentro
        }
        joy.x = 0; joy.y = 0;
    }

    // Pedestres e Moedas (Apenas fora)
    if (!inHouse) {
        if (pedestrians.length < 5) pedestrians.push({
            x: car.x + (Math.random()-0.5)*1000, y: car.y + (Math.random()-0.5)*1000,
            angle: Math.random()*Math.PI*2, speed: 1.5, anim: 0
        });
        pedestrians.forEach(p => {
            p.x += Math.cos(p.angle)*p.speed; p.y += Math.sin(p.angle)*p.speed;
            p.anim += 0.1;
        });

        if (Math.random() < 0.02 && coins.length < 15) {
            coins.push({ x: player.x + (Math.random()-0.5)*1200, y: player.y + (Math.random()-0.5)*1200, collected: false });
        }
        coins.forEach(c => {
            if (!c.collected && Math.sqrt((player.x-c.x)**2 + (player.y-c.y)**2) < 35) {
                c.collected = true; score += 10;
                if (score >= fase * 100) { fase++; score = 0; alert("Fase " + fase); }
            }
        });
    }
}

function drawGrid() {
    const size = 150;
    const startX = Math.floor((player.x - canvas.width) / size) * size;
    const startY = Math.floor((player.y - canvas.height) / size) * size;

    for (let x = startX; x < player.x + canvas.width; x += size) {
        for (let y = startY; y < player.y + canvas.height; y += size) {
            ctx.fillStyle = (Math.floor(x/size) + Math.floor(y/size)) % 2 === 0 ? "#2e7d32" : "#388e3c";
            ctx.fillRect(x, y, size, size);
            ctx.strokeStyle = "rgba(0,0,0,0.05)";
            ctx.strokeRect(x, y, size, size);
        }
    }
}

function drawHouse() {
    // Chão e Paredes
    ctx.fillStyle = "#5d4037";
    ctx.fillRect(-300, -300, 600, 600);
    ctx.strokeStyle = "#3e2723";
    ctx.lineWidth = 15;
    ctx.strokeRect(-300, -300, 600, 600);
    // Tapete da Porta
    ctx.fillStyle = "#4e342e";
    ctx.fillRect(doorPos.x - 50, doorPos.y - 20, 100, 40);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 20px Arial";
    ctx.fillText("SAÍDA", doorPos.x - 30, doorPos.y + 5);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

    if (!inHouse) drawGrid();
    drawHouse(); // Sempre desenha a casa

    if (!inHouse) {
        coins.forEach(c => { if (!c.collected) { ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, Math.PI*2); ctx.fill(); }});
        pedestrians.forEach(p => {
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle+Math.PI/2);
            ctx.fillStyle = "#4caf50"; ctx.fillRect(-10, -10, 20, 20); ctx.restore();
        });

        // Desenhar Carro
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        
        // Faróis
        if (car.lights) {
            const grd = ctx.createRadialGradient(50, 0, 10, 150, 0, 150);
            grd.addColorStop(0, "rgba(255, 255, 200, 0.6)");
            grd.addColorStop(1, "rgba(255, 255, 200, 0)");
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.moveTo(40, 0); ctx.lineTo(200, -80); ctx.lineTo(200, 80); ctx.fill();
        }

        ctx.fillStyle = "#1565c0"; ctx.fillRect(-45, -25, 90, 50);
        ctx.fillStyle = "#000"; ctx.fillRect(-35, -32, 20, 10); ctx.fillRect(15, -32, 20, 10);
        ctx.fillRect(-35, 22, 20, 10); ctx.fillRect(15, 22, 20, 10);
        ctx.restore();
    }

    // Player
    if (!player.inCar) {
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle + Math.PI/2);
        let bob = Math.sin(player.anim) * 4;
        ctx.fillStyle = "#ff5722"; ctx.fillRect(-12, -10 + bob, 24, 25);
        ctx.fillStyle = "#ffe0bd"; ctx.beginPath(); ctx.arc(0, -18 + bob, 11, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    ctx.restore();
    document.getElementById("txtFase").innerText = "Fase: " + fase;
    document.getElementById("txtMoedas").innerText = "Moedas: " + score + "/" + (fase*100);
    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
