<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Mobile - Deive Abraão</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            font-family: sans-serif;
        }

        canvas { display: block; }

        #ui-layer {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            z-index: 10;
        }

        #joystickBase {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            touch-action: none;
        }

        #joystick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            top: 30px;
            left: 30px;
            pointer-events: none;
        }

        .action-btn {
            position: fixed;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ffffffcc;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            touch-action: none;
            z-index: 20;
        }

        #carBtn { bottom: 40px; right: 30px; width: 85px; height: 85px; border: 3px solid #1565c0; color: #1565c0; }
        #hornBtn { bottom: 140px; right: 30px; border: 2px solid #f44336; color: #f44336; display: none; }
        #lightBtn { bottom: 140px; right: 110px; border: 2px solid #ffeb3b; color: #fbc02d; display: none; }
    </style>
</head>

<body oncontextmenu="return false">

<div id="ui-layer">
    <div id="txtFase">Fase: 1</div>
    <div id="txtMoedas">Moedas: 0/100</div>
</div>

<canvas id="game"></canvas>

<div id="joystickBase"><div id="joystick"></div></div>
<div id="carBtn">CARRO</div>
<div id="hornBtn" class="action-btn">BUZINA</div>
<div id="lightBtn" class="action-btn">FAROL</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* CONTROLES MULTI-TOUCH */
let joy = {x:0, y:0};
let joystickTouchId = null;

const base = document.getElementById("joystickBase");
const stick = document.getElementById("joystick");

base.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystickTouchId = touch.identifier;
    updateJoystick(touch);
}, { passive: false });

window.addEventListener("touchmove", (e) => {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joystickTouchId) {
            updateJoystick(e.changedTouches[i]);
        }
    }
}, { passive: false });

window.addEventListener("touchend", (e) => {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joystickTouchId) {
            joystickTouchId = null;
            joy.x = 0; joy.y = 0;
            stick.style.left = "30px";
            stick.style.top = "30px";
        }
    }
});

function updateJoystick(touch) {
    let rect = base.getBoundingClientRect();
    let x = touch.clientX - rect.left - 60;
    let y = touch.clientY - rect.top - 60;
    let d = Math.sqrt(x*x + y*y), max = 40;
    if (d > max) { x = x/d*max; y = y/d*max; }
    joy.x = x/max; joy.y = y/max;
    stick.style.left = (x + 30) + "px";
    stick.style.top = (y + 30) + "px";
}

/* ESTADO DO JOGO */
let player = { x: 0, y: 100, inCar: false, angle: 0, anim: 0 };
let car = { x: 300, y: 300, vx: 0, vy: 0, angle: 0, lights: false };
let inHouse = true;
let doorPos = { x: 0, y: 150 }; // Posição da porta no mundo
let fase = 1;
let score = 0;
let coins = [];
let pedestrians = [];

/* ÁUDIO DA BUZINA */
function playHorn() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
}

/* BOTÕES DE AÇÃO */
document.getElementById("carBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (inHouse) return;
    let dx = player.x - car.x;
    let dy = player.y - car.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (player.inCar) {
        player.inCar = false;
        player.x = car.x + 60 * Math.cos(car.angle + Math.PI/2); 
        document.getElementById("hornBtn").style.display = "none";
        document.getElementById("lightBtn").style.display = "none";
    } else if (dist < 100) {
        player.inCar = true;
        document.getElementById("hornBtn").style.display = "flex";
        document.getElementById("lightBtn").style.display = "flex";
    }
}, { passive: false });

document.getElementById("hornBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (player.inCar) playHorn();
}, { passive: false });

document.getElementById("lightBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (player.inCar) car.lights = !car.lights;
}, { passive: false });

function spawnPedestrian() {
    if (pedestrians.length < 8 && !inHouse) {
        pedestrians.push({
            x: player.x + (Math.random() - 0.5) * 1500,
            y: player.y + (Math.random() - 0.5) * 1500,
            angle: Math.random() * Math.PI * 2,
            speed: 1 + Math.random(),
            anim: 0,
            changeDir: Date.now() + 2000
        });
    }
}

/* ATUALIZAÇÃO */
function update() {
    const playerSpeed = 4;
    const carAcc = 0.6;
    const carFriction = 0.95;
    const carMax = 12;

    if (player.inCar) {
        car.vx += joy.x * carAcc;
        car.vy += joy.y * carAcc;
        let speed = Math.sqrt(car.vx*car.vx + car.vy*car.vy);
        if (speed > carMax) { car.vx = (car.vx/speed) * carMax; car.vy = (car.vy/speed) * carMax; }
        if (speed > 0.5) car.angle = Math.atan2(car.vy, car.vx);
        car.x += car.vx; car.y += car.vy;
        car.vx *= carFriction; car.vy *= carFriction;
        player.x = car.x; player.y = car.y;
    } else {
        if (Math.abs(joy.x) > 0.1 || Math.abs(joy.y) > 0.1) {
            player.angle = Math.atan2(joy.y, joy.x);
            player.anim += 0.2;
        }
        player.x += joy.x * playerSpeed;
        player.y += joy.y * playerSpeed;
    }

    if (!inHouse) {
        spawnPedestrian();
        pedestrians.forEach(p => {
            if (Date.now() > p.changeDir) {
                p.angle += (Math.random() - 0.5);
                p.changeDir = Date.now() + 2000 + Math.random() * 3000;
            }
            p.x += Math.cos(p.angle) * p.speed;
            p.y += Math.sin(p.angle) * p.speed;
            p.anim += 0.1;
        });

        // Colisão com a porta da casa (pelo lado de fora)
        if (Math.abs(player.x - 0) < 40 && Math.abs(player.y - 145) < 30 && !player.inCar) {
            inHouse = true;
            player.x = 0; player.y = 100;
        }
    } else {
        // Colisão com a porta (pelo lado de dentro)
        if (Math.abs(player.x - 0) < 40 && Math.abs(player.y - 150) < 20) {
            inHouse = false;
            player.x = 0; player.y = 180;
        }
    }

    if (!inHouse) {
        if (Math.random() < 0.02 && coins.length < 20) {
            coins.push({ x: player.x + (Math.random()-0.5)*1500, y: player.y + (Math.random()-0.5)*1500, collected: false });
        }
        coins.forEach(c => {
            if (!c.collected && Math.sqrt((player.x-c.x)**2 + (player.y-c.y)**2) < 35) {
                c.collected = true; score += 10;
                if (score >= fase * 100) { fase++; score = 0; }
            }
        });
    }
}

/* DESENHOS */
function drawPerson(x, y, angle, anim, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle + Math.PI/2);
    let bob = Math.sin(anim) * 3;
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath(); ctx.ellipse(0, 15, 15, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#212121";
    ctx.fillRect(-8, 10 + (Math.sin(anim) * 5), 6, 12);
    ctx.fillRect(2, 10 + (Math.cos(anim) * 5), 6, 12);
    ctx.fillStyle = color;
    ctx.fillRect(-12, -10 + bob, 24, 25);
    ctx.fillStyle = "#ffe0bd";
    ctx.beginPath(); ctx.arc(0, -18 + bob, 11, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawHouse() {
    // Paredes
    ctx.fillStyle = "#5d4037";
    ctx.fillRect(-200, -150, 400, 300);
    // Detalhe do Telhado
    ctx.fillStyle = "#3e2723";
    ctx.fillRect(-210, -160, 420, 20);
    // Porta
    ctx.fillStyle = "#222";
    ctx.fillRect(-40, 130, 80, 20);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

    if (!inHouse) {
        // Chão com textura (Grama quadriculada para referência de movimento)
        let size = 200;
        let startX = Math.floor((player.x - canvas.width) / size) * size;
        let startY = Math.floor((player.y - canvas.height) / size) * size;
        
        for(let x = startX; x < player.x + canvas.width; x += size) {
            for(let y = startY; y < player.y + canvas.height; y += size) {
                ctx.fillStyle = ((Math.abs(x+y)/size) % 2 === 0) ? "#2e7d32" : "#388e3c";
                ctx.fillRect(x, y, size, size);
            }
        }

        drawHouse();

        coins.forEach(c => { if (!c.collected) { ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, Math.PI*2); ctx.fill(); }});
        pedestrians.forEach(p => drawPerson(p.x, p.y, p.angle, p.anim, "#4caf50"));

        // Carro
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        
        // Faróis
        if (car.lights) {
            let grad = ctx.createRadialGradient(50, 0, 10, 150, 0, 100);
            grad.addColorStop(0, "rgba(255, 255, 200, 0.6)");
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.moveTo(40,-20); ctx.lineTo(180, -60); ctx.lineTo(180, 60); ctx.lineTo(40, 20); ctx.fill();
        }

        ctx.fillStyle = "#1565c0"; ctx.fillRect(-45, -25, 90, 50);
        ctx.fillStyle = "#1e88e5"; ctx.fillRect(-20, -20, 40, 40);
        ctx.fillStyle = "#000"; 
        ctx.fillRect(-35, -32, 20, 10); ctx.fillRect(15, -32, 20, 10);
        ctx.fillRect(-35, 22, 20, 10); ctx.fillRect(15, 22, 20, 10);
        ctx.restore();
    } else {
        // Interior da Casa
        ctx.fillStyle = "#4e342e";
        ctx.fillRect(-canvas.width, -canvas.height, canvas.width*2, canvas.height*2);
        ctx.fillStyle = "#5d4037"; ctx.fillRect(-300, -300, 600, 600);
        ctx.strokeStyle = "#3e2723"; ctx.lineWidth = 20; ctx.strokeRect(-300, -300, 600, 600);
        ctx.fillStyle = "#222"; ctx.fillRect(-40, 285, 80, 30);
    }

    if (!player.inCar) drawPerson(player.x, player.y, player.angle, player.anim, "#ff5722");

    ctx.restore();
    document.getElementById("txtFase").innerText = "Fase: " + fase;
    document.getElementById("txtMoedas").innerText = "Moedas: " + score + "/" + (fase*100);
    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
