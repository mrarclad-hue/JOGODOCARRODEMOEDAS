<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Jogos - Seleção</title>
    <style>
        :root {
            --primary-color: #6200ea;
            --accent-color: #03dac6;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            opacity: 0.8;
            margin-top: 10px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-color);
            box-shadow: 0 8px 25px rgba(98, 0, 234, 0.4);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .game-card h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .btn-play {
            margin-top: 20px;
            background-color: var(--primary-color);
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .game-card:hover .btn-play {
            background-color: var(--accent-color);
            color: #000;
        }

        /* Responsividade para Celular */
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Game Central</h1>
        <p>Escolha seu desafio e comece a jogar</p>
    </header>

    <div class="container">
        <a href="jogobase.html" class="game-card">
            <div class="icon">🎮</div>
            <h2>Jogo Base</h2>
            <p>A experiência clássica</p>
            <div class="btn-play">Jogar Agora</div>
        </a>

        <a href="jogopro.html" class="game-card">
            <div class="icon">🚀</div>
            <h2>Jogo Pro</h2>
            <p>Nível avançado e desafios</p>
            <div class="btn-play">Jogar Agora</div>
        </a>

        <a href="jogocorrida.html" class="game-card">
            <div class="icon">🏎️</div>
            <h2>Jogo de Corrida</h2>
            <p>Velocidade e adrenalina</p>
            <div class="btn-play">Jogar Agora</div>
        </a>
    </div>

</body>
</html>
