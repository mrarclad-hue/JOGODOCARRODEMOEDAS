<!DOCTYPE html>
Ei atualiza o primeiro jogo  <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joguinho do Deive Abraão - Versão Armada!</title>
    <style>
        body {
            /* Estilo cinza escuro que você gosta */
            background-color: #333;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden; /* Impede barras de rolagem */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 80vw;
            height: 80vh;
            border: 2px solid #555;
            background-color: #222;
            cursor: crosshair; /* Muda o mouse para uma mira */
        }

        /* Estilo da imagem do Deive */
        #deive {
            position: absolute;
            width: 100px; /* Ajuste o tamanho aqui */
            height: auto;
            transition: all 0.2s ease-out; /* Movimento suave */
            cursor: pointer;
        }

        /* Estilo do efeito de tiro (o rastro) */
        .bullet-trail {
            position: absolute;
            height: 4px;
            background-color: yellow; /* Cor do rastro */
            border-radius: 2px;
            pointer-events: none; /* Não interfere nos cliques */
            opacity: 0.8;
            transform-origin: left center; /* Para girar a partir do início */
        }
    </style>
</head>
<body>

    <div id="game-container">
        <img id="deive" src="sua-imagem-atual.png" alt="Deive Abraão">
    </div>

    <script>
        const deive = document.getElementById('deive');
        const container = document.getElementById('game-container');
        
        // --- CONFIGURAÇÕES ---
        // Nome da imagem do Deive parado/padrão
        const imgPadrao = 'sua-imagem-atual.png'; 
        // Nome da imagem do Deive segurando a arma
        const imgArmado = 'deive-armado.png'; 
        // Intervalo de tempo para ele mudar de posição (em milissegundos)
        let velocidade = 1000; 

        // Estado do jogo
        let estaArmado = false;
        let gameInterval;

        // --- FUNÇÕES ---

        // Função para mover o Deive aleatoriamente
        function moverDeive() {
            const containerRect = container.getBoundingClientRect();
            const deiveRect = deive.getBoundingClientRect();

            // Calcula posições aleatórias, garantindo que ele não saia da borda
            const maxX = containerRect.width - deiveRect.width;
            const maxY = containerRect.height - deiveRect.height;

            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;

            deive.style.left = newX + 'px';
            deive.style.top = newY + 'px';
        }

        // Função para o Deive ficar armado e atirar
        function acaoTiro() {
            if (estaArmado) return; // Impede que atire várias vezes seguidas

            estaArmado = true;
            deive.src = imgArmado; // Muda para a imagem armada

            // Cria o efeito de tiro (rastro)
            const trail = document.createElement('div');
            trail.classList.add('bullet-trail');
            container.appendChild(trail);

            // Posiciona o início do rastro no centro da imagem do Deive
            const deiveRect = deive.getBoundingClientRect();
            const startX = deiveRect.left + deiveRect.width / 2;
            const startY = deiveRect.top + deiveRect.height / 2;

            // Define o destino do tiro (pode ser o centro da tela ou aleatório)
            const destX = container.offsetWidth / 2;
            const destY = container.offsetHeight / 2;

            // Calcula o ângulo e o comprimento do rastro
            const deltaX = destX - startX;
            const deltaY = destY - startY;
            const angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            // Aplica os estilos ao rastro
            trail.style.width = distance + 'px';
            trail.style.left = (startX - container.getBoundingClientRect().left) + 'px';
            trail.style.top = (startY - container.getBoundingClientRect().top) + 'px';
            trail.style.transform = `rotate(${angle}deg)`;

            // Remove o efeito de tiro após um curto período
            setTimeout(() => {
                trail.remove();
            }, 100);

            // Volta para a imagem padrão e para de mover após um tempo
            setTimeout(() => {
                deive.src = imgPadrao;
                estaArmado = false;
                
                // Opcional: faz o Deive "parar" por um momento após o tiro
                clearInterval(gameInterval);
                setTimeout(() => {
                    gameInterval = setInterval(moverDeive, velocidade);
                }, 1000); 
            }, 500); 
        }

        // --- EVENTOS ---

        // Inicia o jogo
        gameInterval = setInterval(moverDeive, velocidade);

        // Quando clicar no Deive, ele atira
        deive.addEventListener('click', (event) => {
            // Se clicar nele enquanto ele já está armado, pode contar ponto ou fazer algo
            // Aqui estamos apenas chamando a ação de tiro
            acaoTiro();
        });

        // Opcional: Permitir que ele atire aleatoriamente
        /*
        setInterval(() => {
            if (Math.random() < 0.2) { // 20% de chance de atirar a cada movimento
                acaoTiro();
            }
        }, velocidade);
        */

    </script>
</body>
</html>
