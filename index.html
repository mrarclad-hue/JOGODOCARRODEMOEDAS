<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Mobile - Deive Abraão</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            font-family: sans-serif;
        }

        canvas { display: block; }

        #ui-layer {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            z-index: 10;
        }

        #controls-right {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: rgba(255,255,255,0.2);
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            touch-action: none;
            text-shadow: 1px 1px 2px #000;
        }

        #carBtn { background: #1565c0cc; border-color: #1565c0; width: 85px; height: 85px; font-size: 14px; }
        #hornBtn { background: #f44336cc; border-color: #f44336; }
        #lightBtn { background: #ffeb3bcc; border-color: #fbc02d; color: #000; }

        #joystickBase {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            touch-action: none;
        }

        #joystick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            top: 30px;
            left: 30px;
            pointer-events: none;
        }
    </style>
</head>

<body oncontextmenu="return false">

<div id="ui-layer">
    <div id="txtFase" style="font-weight: bold; color: #ffeb3b;">NÍVEL: 1 / 5</div>
    <div id="txtMoedas">Moedas: 0 / 10</div>
</div>

<canvas id="game"></canvas>

<div id="joystickBase"><div id="joystick"></div></div>

<div id="controls-right">
    <div id="lightBtn" class="btn">FAROL</div>
    <div id="hornBtn" class="btn">BUZINA</div>
    <div id="carBtn" class="btn">CARRO</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* MOTOR DE ÁUDIO */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, duration, vol = 0.1) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playCarEnter() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(100, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

function playCarExit() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

function playLevelUp() {
    playSound(523, 'sine', 0.1);
    setTimeout(() => playSound(659, 'sine', 0.1), 100);
    setTimeout(() => playSound(783, 'sine', 0.2), 200);
}

let motorOsc = null;
let motorGain = null;
function updateMotorSound(speed) {
    if (player.inCar) {
        if (!motorOsc) {
            motorOsc = audioCtx.createOscillator();
            motorGain = audioCtx.createGain();
            motorOsc.type = 'sawtooth';
            motorGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            motorOsc.connect(motorGain);
            motorGain.connect(audioCtx.destination);
            motorOsc.start();
        }
        motorOsc.frequency.setTargetAtTime(50 + (speed * 15), audioCtx.currentTime, 0.1);
    } else if (motorOsc) {
        motorOsc.stop();
        motorOsc = null;
    }
}

/* CONTROLES */
let joy = {x:0, y:0};
let joystickTouchId = null;
const base = document.getElementById("joystickBase");
const stick = document.getElementById("joystick");

base.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystickTouchId = touch.identifier;
    updateJoystick(touch);
}, { passive: false });

window.addEventListener("touchmove", (e) => {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joystickTouchId) updateJoystick(e.changedTouches[i]);
    }
}, { passive: false });

window.addEventListener("touchend", (e) => {
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === joystickTouchId) {
            joystickTouchId = null;
            joy.x = 0; joy.y = 0;
            stick.style.left = "30px"; stick.style.top = "30px";
        }
    }
});

function updateJoystick(touch) {
    let rect = base.getBoundingClientRect();
    let x = touch.clientX - rect.left - 60, y = touch.clientY - rect.top - 60;
    let d = Math.sqrt(x*x + y*y), max = 40;
    if (d > max) { x = x/d*max; y = y/d*max; }
    joy.x = x/max; joy.y = y/max;
    stick.style.left = (x + 30) + "px"; stick.style.top = (y + 30) + "px";
}

/* ESTADO DO JOGO */
let player = { x: 0, y: 100, inCar: false, angle: 0, anim: 0 };
let car = { x: 300, y: 300, vx: 0, vy: 0, angle: 0, lights: false };
let inHouse = true;
let housePos = { x: 0, y: 0 };
let door = { x: 0, y: 150 };
let fase = 1, score = 0, coins = [], pedestrians = [];

/* SISTEMA DE NÍVEIS */
function nextLevel() {
    if (fase < 5) {
        fase++;
        score = 0;
        coins = [];
        pedestrians = [];
        playLevelUp();
        // Spawna novas moedas em locais aleatórios
        for(let i=0; i<15; i++) {
            coins.push({ 
                x: player.x + (Math.random() - 0.5) * 2000, 
                y: player.y + (Math.random() - 0.5) * 2000, 
                collected: false 
            });
        }
    } else {
        alert("PARABÉNS! Você completou os 5 níveis da cidade!");
        fase = 1; score = 0;
    }
}

/* AÇÕES DOS BOTÕES */
document.getElementById("carBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    let dx = player.x - car.x, dy = player.y - car.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (player.inCar) {
        player.inCar = false;
        playCarExit();
        player.x = car.x + 60 * Math.cos(car.angle + Math.PI/2); 
    } else if (dist < 120 && !inHouse) {
        player.inCar = true;
        playCarEnter();
    }
}, { passive: false });

document.getElementById("hornBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (!player.inCar) return;
    playSound(440, 'square', 0.15, 0.1);
    pedestrians.forEach(p => {
        let d = Math.sqrt((p.x - car.x)**2 + (p.y - car.y)**2);
        if (d < 250) { p.scared = true; p.scaredTimer = Date.now() + 1000; }
    });
}, { passive: false });

document.getElementById("lightBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if(player.inCar) car.lights = !car.lights;
}, { passive: false });

function spawnPedestrian() {
    if (pedestrians.length < 8 + (fase * 2) && !inHouse) {
        pedestrians.push({
            x: player.x + (Math.random() - 0.5) * 1500,
            y: player.y + (Math.random() - 0.5) * 1500,
            angle: Math.random() * Math.PI * 2,
            speed: 1 + Math.random() + (fase * 0.2),
            anim: 0,
            changeDir: Date.now() + 2000,
            offScreenTime: null,
            scared: false,
            scaredTimer: 0
        });
    }
}

function update() {
    const playerSpeed = 4;
    const carAcc = 0.6, carFriction = 0.95, carMax = 12 + (fase);

    if (player.inCar) {
        car.vx += joy.x * carAcc; car.vy += joy.y * carAcc;
        let speed = Math.sqrt(car.vx*car.vx + car.vy*car.vy);
        updateMotorSound(speed);
        if (speed > carMax) { car.vx = (car.vx/speed)*carMax; car.vy = (car.vy/speed)*carMax; }
        if (speed > 0.5) car.angle = Math.atan2(car.vy, car.vx);
        car.x += car.vx; car.y += car.vy;
        car.vx *= carFriction; car.vy *= carFriction;
        player.x = car.x; player.y = car.y;
    } else {
        updateMotorSound(0);
        if (Math.abs(joy.x) > 0.1 || Math.abs(joy.y) > 0.1) {
            player.angle = Math.atan2(joy.y, joy.x);
            player.anim += 0.2;
        }
        player.x += joy.x * playerSpeed; player.y += joy.y * playerSpeed;
    }

    if (!inHouse) {
        spawnPedestrian();
        for (let i = pedestrians.length - 1; i >= 0; i--) {
            let p = pedestrians[i];
            let screenX = p.x - (player.x - canvas.width/2);
            let screenY = p.y - (player.y - canvas.height/2);
            let isOff = (screenX < -200 || screenX > canvas.width + 200 || screenY < -200 || screenY > canvas.height + 200);
            
            if (isOff) {
                if (!p.offScreenTime) p.offScreenTime = Date.now();
                if (Date.now() - p.offScreenTime > 2000) { pedestrians.splice(i, 1); continue; }
            } else { p.offScreenTime = null; }

            if (!(p.scared && Date.now() < p.scaredTimer)) {
                p.scared = false;
                if (Date.now() > p.changeDir) {
                    p.angle += (Math.random() - 0.5);
                    p.changeDir = Date.now() + 2000 + Math.random() * 3000;
                }
                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed;
                p.anim += 0.1;
            }
        }

        // Sistema de Moedas
        if (Math.random() < 0.03 && coins.length < 15) {
            coins.push({ x: player.x + (Math.random()-0.5)*1800, y: player.y + (Math.random()-0.5)*1800, collected: false });
        }
        coins.forEach(c => {
            if (!c.collected && Math.sqrt((player.x-c.x)**2 + (player.y-c.y)**2) < 40) {
                c.collected = true; 
                score++;
                playSound(880, 'sine', 0.1, 0.05);
                if (score >= 10) nextLevel();
            }
        });
    }

    let distToDoor = Math.sqrt((player.x - (housePos.x + door.x))**2 + (player.y - (housePos.y + door.y))**2);
    if (distToDoor < 40 && !player.inCar) {
        inHouse = !inHouse;
        player.x = housePos.x + door.x;
        player.y = inHouse ? housePos.y + door.y - 50 : housePos.y + door.y + 60;
        joy.x = 0; joy.y = 0;
    }
}

function drawPerson(x, y, angle, anim, color, isScared) {
    ctx.save();
    ctx.translate(x, y);
    if (isScared) ctx.translate(0, -20);
    ctx.rotate(angle + Math.PI/2);
    let bob = Math.sin(anim) * 3;
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath(); ctx.ellipse(0, 15, 15, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#212121";
    ctx.fillRect(-8, 10 + (Math.sin(anim) * 5), 6, 12);
    ctx.fillRect(2, 10 + (Math.cos(anim) * 5), 6, 12);
    ctx.fillStyle = color;
    ctx.fillRect(-12, -10 + bob, 24, 25);
    ctx.fillStyle = "#ffe0bd";
    ctx.beginPath(); ctx.arc(0, -18 + bob, 11, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

    if (!inHouse) {
        ctx.fillStyle = "#2e7d32";
        ctx.fillRect(player.x - canvas.width, player.y - canvas.height, canvas.width * 2, canvas.height * 2);
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        for (let x = player.x - canvas.width; x < player.x + canvas.width; x += 100) {
            ctx.beginPath(); ctx.moveTo(x - (x % 100), player.y - canvas.height); ctx.lineTo(x - (x % 100), player.y + canvas.height); ctx.stroke();
        }
        for (let y = player.y - canvas.height; y < player.y + canvas.height; y += 100) {
            ctx.beginPath(); ctx.moveTo(player.x - canvas.width, y - (y % 100)); ctx.lineTo(player.x + canvas.width, y - (y % 100)); ctx.stroke();
        }
    }

    // Desenha Casa
    ctx.save();
    ctx.translate(housePos.x, housePos.y);
    ctx.fillStyle = "#5d4037"; ctx.fillRect(-300, -300, 600, 600);
    ctx.strokeStyle = "#3e2723"; ctx.lineWidth = 15; ctx.strokeRect(-300, -300, 600, 600);
    ctx.fillStyle = "#222"; ctx.fillRect(door.x - 40, door.y - 10, 80, 20); 
    ctx.restore();

    if (!inHouse) {
        pedestrians.forEach(p => drawPerson(p.x, p.y, p.angle, p.anim, "#4caf50", p.scared));
        coins.forEach(c => { 
            if (!c.collected) { 
                ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.font = "bold 10px Arial"; ctx.fillText("$", c.x-3, c.y+4);
            }
        });
    }

    // Carro
    ctx.save();
    ctx.translate(car.x, car.y); ctx.rotate(car.angle);
    if(car.lights) {
        let grad = ctx.createLinearGradient(40, 0, 200, 0);
        grad.addColorStop(0, "rgba(255, 255, 200, 0.4)"); grad.addColorStop(1, "rgba(255, 255, 200, 0)");
        ctx.fillStyle = grad; ctx.beginPath(); ctx.moveTo(40, -20); ctx.lineTo(200, -60); ctx.lineTo(200, 60); ctx.lineTo(40, 20); ctx.fill();
    }
    ctx.fillStyle = "#1565c0"; ctx.fillRect(-45, -25, 90, 50);
    ctx.fillStyle = "#1e88e5"; ctx.fillRect(-20, -20, 40, 40);
    ctx.fillStyle = "#000"; ctx.fillRect(-35, -32, 20, 10); ctx.fillRect(15, -32, 20, 10); ctx.fillRect(-35, 22, 20, 10); ctx.fillRect(15, 22, 20, 10);
    if(car.lights) { ctx.fillStyle = "#fff"; ctx.fillRect(40, -20, 5, 10); ctx.fillRect(40, 10, 5, 10); }
    ctx.restore();

    if (!player.inCar) drawPerson(player.x, player.y, player.angle, player.anim, "#ff5722", false);

    ctx.restore();
    
    document.getElementById("txtFase").innerText = "NÍVEL: " + fase + " / 5";
    document.getElementById("txtMoedas").innerText = "Moedas: " + score + " / 10";
    
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
