<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Mobile - Deive Abraão</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; user-select: none; -webkit-user-select: none; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui-layer { position: fixed; top: 20px; left: 20px; color: white; font-size: 18px; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        #controls-right { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fff; background: rgba(255,255,255,0.2); color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 12px; touch-action: none; text-shadow: 1px 1px 2px #000; }
        #carBtn { background: #1565c0cc; border-color: #1565c0; width: 85px; height: 85px; font-size: 14px; }
        #hornBtn { background: #f44336cc; border-color: #f44336; }
        #lightBtn { background: #ffeb3bcc; border-color: #fbc02d; color: #000; }
        #joystickBase { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); touch-action: none; }
        #joystick { position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.8); border-radius: 50%; top: 30px; left: 30px; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false">

<div id="ui-layer">
    <div id="txtFase" style="font-weight: bold; color: #ffeb3b;">MAPA: 1 (BAIRRO)</div>
    <div id="txtMoedas">Moedas: 0 / 10</div>
</div>

<canvas id="game"></canvas>
<div id="joystickBase"><div id="joystick"></div></div>
<div id="controls-right">
    <div id="lightBtn" class="btn">FAROL</div>
    <div id="hornBtn" class="btn">BUZINA</div>
    <div id="carBtn" class="btn">CARRO</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener("resize", resize);

/* MOTOR DE ÁUDIO */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let motorOsc = null;
let motorGain = null;

function playSound(f, t, d, v = 0.1) {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}

function updateMotorSound(speed) {
    if (player.inCar) {
        if (!motorOsc) {
            motorOsc = audioCtx.createOscillator(); motorGain = audioCtx.createGain();
            motorOsc.type = 'sawtooth'; motorGain.gain.setValueAtTime(0.015, audioCtx.currentTime);
            motorOsc.connect(motorGain); motorGain.connect(audioCtx.destination); motorOsc.start();
        }
        motorOsc.frequency.setTargetAtTime(60 + (speed * 12), audioCtx.currentTime, 0.1);
    } else if (motorOsc) { motorOsc.stop(); motorOsc = null; }
}

const levels = {
    1: { name: "BAIRRO", floor: "#2e7d32", car: "#1565c0", npc: "#4caf50", grid: "rgba(255,255,255,0.05)" },
    2: { name: "DESERTO", floor: "#edc9af", car: "#795548", npc: "#bcaaa4", grid: "rgba(0,0,0,0.05)" },
    3: { name: "ASFALTO", floor: "#37474f", car: "#d32f2f", npc: "#90a4ae", grid: "rgba(255,255,255,0.1)" },
    4: { name: "GELO", floor: "#e1f5fe", car: "#0288d1", npc: "#81d4fa", grid: "rgba(0,0,0,0.03)" },
    5: { name: "VULCÃO", floor: "#4e342e", car: "#212121", npc: "#ff5722", grid: "rgba(255,87,34,0.1)" }
};

let player = { x: 0, y: 100, inCar: false, angle: 0, anim: 0 };
let car = { x: 300, y: 300, vx: 0, vy: 0, angle: 0, lights: false };
let inHouse = true, housePos = { x: 0, y: 0 }, door = { x: 0, y: 150 };
let fase = 1, score = 0, coins = [], pedestrians = [];
let joy = {x:0, y:0}, joystickTouchId = null;

function nextLevel() {
    fase = (fase < 5) ? fase + 1 : 1;
    score = 0; coins = []; pedestrians = [];
    playSound(523, 'sine', 0.15); setTimeout(() => playSound(783, 'sine', 0.25), 150);
}

document.getElementById("carBtn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    let d = Math.sqrt((player.x - car.x)**2 + (player.y - car.y)**2);
    if (player.inCar) { player.inCar = false; player.x = car.x + 60 * Math.cos(car.angle + Math.PI/2); playSound(200, 'sine', 0.2); }
    else if (d < 120 && !inHouse) { player.inCar = true; playSound(150, 'sine', 0.2); }
}, { passive: false });

document.getElementById("hornBtn").addEventListener("touchstart", (e) => {
    e.preventDefault(); if (!player.inCar) return;
    playSound(440, 'square', 0.15);
    pedestrians.forEach(p => { if (Math.sqrt((p.x - car.x)**2 + (p.y - car.y)**2) < 250) { p.scared = true; p.scaredTimer = Date.now() + 1000; }});
}, { passive: false });

document.getElementById("lightBtn").addEventListener("touchstart", (e) => { e.preventDefault(); if(player.inCar) car.lights = !car.lights; }, { passive: false });

const base = document.getElementById("joystickBase"), stick = document.getElementById("joystick");
base.addEventListener("touchstart", (e) => { e.preventDefault(); joystickTouchId = e.changedTouches[0].identifier; updateJoy(e.changedTouches[0]); }, { passive: false });
window.addEventListener("touchmove", (e) => { for (let t of e.changedTouches) if (t.identifier === joystickTouchId) updateJoy(t); }, { passive: false });
window.addEventListener("touchend", (e) => { for (let t of e.changedTouches) if (t.identifier === joystickTouchId) { joystickTouchId = null; joy = {x:0,y:0}; stick.style.left = "30px"; stick.style.top = "30px"; }});

function updateJoy(t) {
    let r = base.getBoundingClientRect(); let x = t.clientX - r.left - 60, y = t.clientY - r.top - 60;
    let d = Math.sqrt(x*x + y*y), m = 40; if (d > m) { x = x/d*m; y = y/d*m; }
    joy.x = x/m; joy.y = y/m; stick.style.left = (x + 30) + "px"; stick.style.top = (y + 30) + "px";
}

function update() {
    const ps = 4, ca = 0.6, cf = 0.95, cm = 12 + fase;
    if (player.inCar) {
        car.vx += joy.x * ca; car.vy += joy.y * ca;
        let s = Math.sqrt(car.vx**2 + car.vy**2);
        updateMotorSound(s);
        if (s > cm) { car.vx = (car.vx/s)*cm; car.vy = (car.vy/s)*cm; }
        if (s > 0.5) car.angle = Math.atan2(car.vy, car.vx);
        car.x += car.vx; car.y += car.vy; car.vx *= cf; car.vy *= cf; player.x = car.x; player.y = car.y;
    } else {
        updateMotorSound(0);
        if (Math.abs(joy.x) > 0.1 || Math.abs(joy.y) > 0.1) { player.angle = Math.atan2(joy.y, joy.x); player.anim += 0.2; }
        player.x += joy.x * ps; player.y += joy.y * ps;
    }

    if (!inHouse) {
        if (pedestrians.length < 10) pedestrians.push({ x: player.x + (Math.random()-0.5)*1500, y: player.y + (Math.random()-0.5)*1500, angle: Math.random()*Math.PI*2, speed: 1+Math.random(), anim: 0, changeDir: Date.now()+2000, scared: false, scaredTimer: 0, dancing: false });
        for (let i = pedestrians.length-1; i>=0; i--) {
            let p = pedestrians[i];
            
            // Lógica de Detecção do Farol (Colisão de Luz)
            p.dancing = false;
            if (car.lights && player.inCar) {
                let dx = p.x - car.x, dy = p.y - car.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let angToNpc = Math.atan2(dy, dx);
                let diffAng = Math.abs(car.angle - angToNpc);
                if (diffAng > Math.PI) diffAng = Math.PI*2 - diffAng;
                if (dist < 200 && diffAng < 0.4) p.dancing = true;
            }

            if (p.dancing) { p.anim += 0.5; } // Dança rápida
            else if (!(p.scared && Date.now() < p.scaredTimer)) {
                p.scared = false;
                if (Date.now() > p.changeDir) { p.angle += (Math.random()-0.5); p.changeDir = Date.now()+2000+Math.random()*3000; }
                p.x += Math.cos(p.angle)*p.speed; p.y += Math.sin(p.angle)*p.speed; p.anim += 0.1;
            }
            if (Math.sqrt((p.x-player.x)**2 + (p.y-player.y)**2) > 2000) pedestrians.splice(i, 1);
        }
        if (Math.random() < 0.03 && coins.length < 15) coins.push({ x: player.x + (Math.random()-0.5)*1800, y: player.y + (Math.random()-0.5)*1800, collected: false });
        coins.forEach(c => { if (!c.collected && Math.sqrt((player.x-c.x)**2 + (player.y-c.y)**2) < 40) { c.collected = true; score++; playSound(880, 'sine', 0.1); if (score >= 10) nextLevel(); }});
    }

    if (Math.sqrt((player.x-(housePos.x+door.x))**2 + (player.y-(housePos.y+door.y))**2) < 40 && !player.inCar) {
        inHouse = !inHouse; player.x = housePos.x+door.x; player.y = inHouse ? housePos.y+door.y-50 : housePos.y+door.y+60; joy = {x:0,y:0};
    }
}

function drawPerson(x, y, angle, anim, color, isS, isD) {
    ctx.save(); ctx.translate(x, y); 
    if (isS) ctx.translate(0, -20); 
    if (isD) { ctx.translate(Math.sin(anim)*10, -5); ctx.rotate(Math.sin(anim)*0.2); } // Movimento de dança
    ctx.rotate(angle + Math.PI/2);
    let b = Math.sin(anim) * 3; ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.beginPath(); ctx.ellipse(0, 15, 15, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#212121"; ctx.fillRect(-8, 10 + (Math.sin(anim)*5), 6, 12); ctx.fillRect(2, 10 + (Math.cos(anim)*5), 6, 12);
    ctx.fillStyle = color; ctx.fillRect(-12, -10+b, 24, 25); ctx.fillStyle = "#ffe0bd"; ctx.beginPath(); ctx.arc(0, -18+b, 11, 0, Math.PI*2); ctx.fill(); ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);
    const lvl = levels[fase];
    if (!inHouse) {
        ctx.fillStyle = lvl.floor; ctx.fillRect(player.x - canvas.width, player.y - canvas.height, canvas.width*2, canvas.height*2);
        ctx.strokeStyle = lvl.grid; ctx.lineWidth = 2;
        for (let x = player.x - canvas.width - (player.x%100); x < player.x + canvas.width; x += 100) { ctx.beginPath(); ctx.moveTo(x, player.y - canvas.height); ctx.lineTo(x, player.y + canvas.height); ctx.stroke(); }
        for (let y = player.y - canvas.height - (player.y%100); y < player.y + canvas.height; y += 100) { ctx.beginPath(); ctx.moveTo(player.x - canvas.width, y); ctx.lineTo(player.x + canvas.width, y); ctx.stroke(); }
        pedestrians.forEach(p => drawPerson(p.x, p.y, p.angle, p.anim, lvl.npc, p.scared, p.dancing));
        coins.forEach(c => { if (!c.collected) { ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "#fff"; ctx.font = "bold 10px Arial"; ctx.fillText("$", c.x-3, c.y+4); }});
    }
    ctx.save(); ctx.translate(housePos.x, housePos.y); ctx.fillStyle = "#5d4037"; ctx.fillRect(-300, -300, 600, 600); ctx.strokeStyle = "#3e2723"; ctx.lineWidth = 15; ctx.strokeRect(-300, -300, 600, 600); ctx.fillStyle = "#222"; ctx.fillRect(door.x-40, door.y-10, 80, 20); ctx.restore();
    ctx.save(); ctx.translate(car.x, car.y); ctx.rotate(car.angle);
    if(car.lights) { let g = ctx.createLinearGradient(40,0,200,0); g.addColorStop(0,"rgba(255,255,200,0.5)"); g.addColorStop(1,"transparent"); ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(40,-20); ctx.lineTo(200,-60); ctx.lineTo(200,60); ctx.lineTo(40,20); ctx.fill(); }
    ctx.fillStyle = lvl.car; ctx.fillRect(-45, -25, 90, 50); ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.fillRect(-20, -20, 40, 40);
    ctx.fillStyle = "#000"; ctx.fillRect(-35,-32,20,10); ctx.fillRect(15,-32,20,10); ctx.fillRect(-35,22,20,10); ctx.fillRect(15,22,20,10);
    if(car.lights) { ctx.fillStyle = "#fff"; ctx.fillRect(40,-20,5,10); ctx.fillRect(40,10,5,10); } ctx.restore();
    if (!player.inCar) drawPerson(player.x, player.y, player.angle, player.anim, "#ff5722", false, false);
    ctx.restore();
    document.getElementById("txtFase").innerText = "MAPA: " + fase + " (" + lvl.name + ")";
    document.getElementById("txtMoedas").innerText = "Moedas: " + score + " / 10";
    update(); requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
